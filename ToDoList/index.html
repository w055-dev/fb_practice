<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "manifest" href="manifest.json">
    <meta name = "mobile-web-app-capable" content="yes">
    <meta name = "theme-color" content="#4285f4">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-120x120.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="blacktranslucent">
    <title>Мой ToDoList</title>
    <link rel = "stylesheet" href="style.css">
    <link rel = "icon" href = "icons/favicon.ico" sizes="16x16" type="image/ico">
</head>
<body>
    <header>
        <h1>Мой ToDoList</h1>
        <nav class="tab is-center">
            <button id = "home-btn" class="tab active col-6">Главная</button>
            <button id = "about-btn" class="tab active col-6">О приложении</button>
        </nav>
    </header>
    <main id="app-content" class="container" style="margin-top: 2rem;"></main>
    <footer class="is-center">
        <button id ="enable-push" class="button success">Включить уведомления</button>
        <button id ="disable-push" class="button error" style="display:none">Отключить уведомления</button>
    </footer>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src = "app.js"></script>
</body>
</html>
