services:
  backend1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3000
    networks:
      - app-net
    restart: unless-stopped

  backend2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3001
    networks:
      - app-net
    restart: unless-stopped

  backend3:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3002
    networks:
      - app-net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - app-net
    restart: unless-stopped

  haproxy:
    image: haproxy:alpine
    ports:
      - "8081:8080"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    driver: bridge