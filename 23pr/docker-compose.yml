services:
  backend1:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=1
    networks:
      - app-network
    restart: unless-stopped

  backend2:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=2
    networks:
      - app-network
    restart: unless-stopped

  backend3:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=3
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - app-network
    depends_on:
      - backend1
      - backend2
      - backend3
    restart: unless-stopped

networks:
  app-network:
    driver: bridge